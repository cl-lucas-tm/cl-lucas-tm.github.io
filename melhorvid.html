<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEOS MT LEGAIS</title>
</head>
<body>
    <h1>O MELHOR MEME DO MUNDO</h1>
    <!--
    controls, autoplay ,loop , muted, width e height (autoexplicativo)
    preload = "metadata", "none","auto" (carrega tudo)
    -->
    <p align="center">
        <video preload ="metadata" controls loop muted width="33%" height="300" poster="clickbait2.png">
            <source src ="melhormeme.mp4" type = "video/mp4">
        </video>
        <br>
        <audio controls>
            <source src = "sirenefect.mp3" type="audio/mp3">
        </audio>
    </p>
</body>
</html>
